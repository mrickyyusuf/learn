<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Formulir isian</h1>
    <form action="/daftar" method="get">

        <div>
        <label for="Nama Lengkap">Nama Lengkap</label>
        <input type="text" placeholder="Nama" id="Nama Lengkap" name="Nama Lengkap">
        </div>    

        <div>
        <label for="Email">Email</label>
        <input type="email" placeholder="Email" id="Email" name="Email">
        </div>

        <div>
        <label for="Password">Password</label>
        <input type="password" placeholder="Password" id="Password" name="Password">
        </div>   

        <div>
        <label for="Number">Number</label>
        <input type="number" placeholder="Phone" id="Number" name="Number">
        </div>
        <button type="submit">Kirim</button>

        <hr>

        <h1>Pesanan</h1>
        <form action="/order">
        <label for="">Baju:</label>
        <div>
        <input type="radio" name="baju" id="" value="Kemeja" checked> <label for="">Kemeja</label>
        <input type="radio" name="baju" id="" value="Kaos"> <label for="">Kaos</label>
        </div>

        <div>
            <label for="ukuran">Ukuran</label>
            <select name="ukuran" id="ukuran">
                <option>-</option>
                <option value="S" selected>Small</option>
                <option value="M">Medium</option>
                <option value="L">Large</option>
            </select>
        </div>

        <div>
            <label for="term">Sesuai pesanan</label>
            <input type="checkbox" name="term" id="term" checked value="Benar">
        </div>

        <div>
            <p>
                <label for="notes">Catatan</label>
            </p>
            <textarea name="notes" id="notes" cols="50" rows="5"></textarea>
        </div>
        <button type="submit">Order</button>
        </form>
        
        <hr>

        <h1>Validasi</h1>
        <form action="valid">
            <input type="text" name="input" required minlength="3" maxlength="5">
            <input type="number" name="number" id="number" min="2" max="5">
            <button type="submit">Kirim</button>
        </form>

    </form>
</body>
</html>
